<!doctype html>
<html lang="en">
    <head>
        <script>
            window.va =
                window.va ||
                function () {
                    (window.vaq = window.vaq || []).push(arguments);
                };
        </script>
        <script defer src="/_vercel/insights/script.js"></script>
        <meta charset="UTF-8" />
        <title>Gams 2.3 Version</title>
        <style>
            .discord-link {
                margin: 20px 0;
                font-size: 18px;
            }
            .discord-link a {
                color: #7289da;
                text-decoration: none;
            }
            .discord-link a:hover {
                text-decoration: underline;
            }
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background: #222;
                color: #fff;
            }
            .site-logo {
                font-size: 2.2rem;
                font-weight: 900;
                color: #ffffff;
                text-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
                margin: 0 0 20px;
                display: inline-flex;
                align-items: center;
                gap: 0.6rem;
                padding: 8px 14px;
                border-radius: 16px;
                background: #222;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            }
            .logo-icon {
                width: 32px;
                height: 32px;
                object-fit: contain;
                display: inline-block;
            }
            .discord-top-right {
                position: fixed;
                top: 14px;
                right: 14px;
                z-index: 999;
                background: #5865f2;
                border-radius: 12px;
                width: 46px;
                height: 46px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
            }
            .discord-top-right img {
                width: 26px;
                height: 26px;
                border-radius: 50%;
            }
            .discord-top-right a {
                display: inline-flex;
                width: 100%;
                height: 100%;
                align-items: center;
                justify-content: center;
            }
            .center-content {
                text-align: center;
            }
            .game-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 24px;
                justify-items: center;
                margin-top: 30px;
                width: 100%;
                max-width: 1280px;
                padding: 0 16px;
                transition: transform 0.1s ease-out;
                transform-origin: 50% 2%;
            }
            .search-container {
                margin-top: 18px;
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .search-input {
                width: 720px;
                max-width: calc(100% - 40px);
                padding: 10px 14px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: rgba(255, 255, 255, 0.04);
                color: #fff;
                font-size: 16px;
                outline: none;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            }
            .search-input::placeholder {
                color: rgba(255, 255, 255, 0.55);
            }
            .search-count {
                display: none;
            }
            .no-results {
                margin-top: 18px;
                color: #ff6b6b;
                font-weight: bold;
                display: none;
            }
            .game-link {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                border-color: #ffffff;
                font-size: 1.2em;
                width: 100%;
                max-width: 220px;
                border-radius: 10px;
                padding: 10px;
                box-sizing: border-box;
            }
            .game-link img {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
            }
            .game-link:hover {
                text-decoration: underline;
            }
            .random {
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .game-rand {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: #ffffff;
                font-size: 0.8em;
                width: 100%;
                max-width: 220px;
            }
            .game-rand img {
                width: 50%;
                height: auto;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
            }
            .game-rand:hover {
                text-decoration: underline;
            }

            /* --- Added Hover Effects --- */
            .game-link {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: #ffffff;
                font-size: 1.2em;
                width: 100%;
                max-width: 220px;
                transition:
                    transform 0.25s ease,
                    filter 0.25s ease;
            }
            .game-link img {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
                transition:
                    transform 0.25s ease,
                    box-shadow 0.25s ease;
            }
            .game-link:hover {
                transform: translateY(-6px);
                filter: brightness(1.08);
            }
            .game-link:hover img {
                transform: scale(1.05);
                box-shadow: 0 6px 22px rgba(255, 255, 255, 0.25);
            }
            .game-link:hover div {
                text-decoration: underline;
                filter: brightness(1.2);
            }

            .game-rand {
                display: flex;
                flex-direction: column;
                align-items: center;
                text-decoration: none;
                color: #ffffff;
                font-size: 0.8em;
                width: 100%;
                max-width: 220px;
                transition:
                    transform 0.25s ease,
                    filter 0.25s ease;
            }
            .game-rand img {
                width: 50%;
                height: auto;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
                margin-bottom: 10px;
                transition:
                    transform 0.25s ease,
                    box-shadow 0.25s ease;
            }
            .game-rand:hover {
                transform: translateY(-6px);
                filter: brightness(1.08);
            }
            .game-rand:hover img {
                transform: scale(1.05);
                box-shadow: 0 6px 22px rgba(255, 255, 255, 0.25);
            }
            .game-rand:hover div {
                text-decoration: underline;
                filter: brightness(1.2);
            }
        </style>
    </head>
    <body>
        <div class="discord-top-right">
            <a
                href="https://gams-offline.github.io/Gams/Gams.html"
                target="_blank"
                rel="noopener noreferrer"
                aria-label=""
                title="Check out our Inspiration"
            >
                <img
                    src="https://gams-offline.github.io/Gams/img/gams-g.png"
                    alt="gams logo"
                />
            </a>
        </div>
        <h1 class="site-logo">
            <a onclick="spinnywheel(true)" class="logo-icon"
                ><img src="favicon.pn" alt="" /></a
            >Gams 2.3<a href="" target="_blank" class="logo-icon"></a>
        </h1>
        <div class="center-content">
            <p>Random Game from the list</p>
            <div class="random">
                <button class="redobutton" onclick="randomgame()">
                    I don't like this game
                </button>
            </div>
            <p>
                All game credits go to gn-math, truffled.lol and Ultimate Game
                Stash
            </p>
            <div class="search-container">
                <input
                    id="search-input"
                    class="search-input"
                    type="search"
                    placeholder="Search games..."
                    aria-label="Search games"
                />
            </div>

            <div class="game-list"></div>
            <div id="no-results" class="no-results">
                No games match your search.
            </div>
        </div>
        <script src="games.js"></script>
        <script src="secret.js"></script>
    </body>
</html>
