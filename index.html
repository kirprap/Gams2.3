<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>

        <style>
            * {
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }

            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #1e1e1e;
            }

            .calculator {
                width: 320px;
                background: #2b2b2b;
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            }

            .display {
                width: 100%;
                height: 60px;
                border: none;
                border-radius: 10px;
                margin-bottom: 15px;
                padding: 10px;
                font-size: 2rem;
                text-align: right;
                background: #111;
                color: white;
            }

            .buttons {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            button {
                height: 60px;
                border: none;
                border-radius: 12px;
                font-size: 1.2rem;
                cursor: pointer;
                background: #3b3b3b;
                color: white;
                transition: 0.2s;
            }

            button:hover {
                background: #4c4c4c;
            }

            .equal {
                background: #ff9500;
            }

            .equal:hover {
                background: #ffad33;
            }

            iframe.secret-frame {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                border: none;
                z-index: 9999;
                display: none;
                background: white;
            }
        </style>
    </head>

    <body>
        <div class="calculator">
            <input type="text" class="display" id="display" readonly />

            <div class="buttons">
                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="append('/')">÷</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="append('*')">×</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('-')">−</button>

                <button onclick="append('0')">0</button>
                <button onclick="append('.')">.</button>
                <button onclick="append('sqrt(')">√</button>
                <button onclick="append('+')">+</button>

                <button onclick="clearDisplay()">C</button>
                <button
                    class="equal"
                    onclick="calculate()"
                    style="grid-column: span 3"
                >
                    =
                </button>
            </div>
        </div>

        <iframe
            id="secretFrame"
            class="secret-frame"
            src="secret.html"
        ></iframe>

        <script>
            const display = document.getElementById("display");
            const secretFrame = document.getElementById("secretFrame");

            function append(value) {
                // Show actual √ symbol
                if (value === "sqrt(") {
                    display.value += "√(";
                    return;
                }

                display.value += value;
            }

            function clearDisplay() {
                display.value = "";
            }

            function calculate() {
                let raw = display.value;

                // Auto close missing parentheses
                const openCount = (raw.match(/\(/g) || []).length;
                const closeCount = (raw.match(/\)/g) || []).length;

                raw += ")".repeat(openCount - closeCount);

                // Secret trigger
                if (raw.replace(/\s/g, "") === "√(-1)") {
                    secretFrame.style.display = "block";
                    return;
                }

                // Convert pretty sqrt into Math.sqrt
                let expression = raw.replace(/√\(/g, "Math.sqrt(");

                try {
                    display.value = eval(expression);
                } catch {
                    display.value = "Error";
                }
            }

            // Keyboard support
            document.addEventListener("keydown", (e) => {
                const allowed = "0123456789+-*/().";

                if (allowed.includes(e.key)) {
                    display.value += e.key;
                }

                if (e.key === "Enter") {
                    calculate();
                }

                if (e.key === "Backspace") {
                    display.value = display.value.slice(0, -1);
                }

                if (e.key.toLowerCase() === "c") {
                    clearDisplay();
                }

                // Type r for square root
                if (e.key.toLowerCase() === "r") {
                    append("sqrt(");
                }

                // ESC closes iframe
                if (e.key === "Escape") {
                    secretFrame.style.display = "none";
                }
            });
            window.addEventListener("keydown", (e) => {
                if (e.key === "`") {
                    document.location.href = "https://classroom.google.com";
                }
            });
        </script>
    </body>
</html>
